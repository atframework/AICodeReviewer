# =============================================================================
# AICodeReviewer — Deployment Configuration Sample
# =============================================================================
# Copy this file as config.yaml, then fill in your values.
# All secrets MUST be provided via environment variables (see .env.sample).
# See example/README.md for detailed setup guides (P4, Feishu, WeCom, etc.).

# ---------------------------------------------------------------------------
# LLM providers
# ---------------------------------------------------------------------------
llm:
  providers:
    - id: my-llm
      kind: openai_compatible # openai_compatible | azure_openai | anthropic | ollama | google_ai_studio | vertex_ai | bedrock | copilot
      base_url: https://api.openai.com/v1
      api_key_env: AICR_LLM_API_KEY # reads API key from $AICR_LLM_API_KEY

  fallback_chain:
    - provider: my-llm
      model: gpt-4o-mini # change to your model
      role: any # any | light | heavy

  retry:
    max_attempts: 3
    backoff:
      kind: exponential
      base_ms: 1000
      max_ms: 30000
      jitter: true

  budget:
    per_run_usd: 0.10
    per_repo_daily_usd: 1.0

  # -------------------------------------------------------------------------
  # Model metadata catalog (M10 — available, opt-in)
  # -------------------------------------------------------------------------
  # Reads model parameters (context window, max input/output tokens,
  # input/output/cache pricing, and tool-call / vision / reasoning / structured
  # output flags) from models.dev so you do not have to hand-maintain them per
  # provider. These values feed compression thresholds, llm.budget cost
  # accounting, and the model config passed to external agent CLIs (Kilo, Zoo,
  # opencode, ...). Disabled by default; set enabled: true to opt in.
  #
  # The refresh cache is stored in storage.database (SQLite by default) as a
  # keyed model_catalog table. Optional Redis backend reuses storage.cache.redis
  # and persists parsed entry/model/source keys while serving runtime point lookups
  # from a startup-loaded in-memory index. The full api.json is parsed only at
  # refresh time and upserted row-by-row, never re-parsed on read.
  #
  # Resolution order when a model is needed:
  #   1. keyed refresh cache (SQLite) — only fetches remote when the
  #      source-level refresh metadata is missing or older than
  #      refresh_interval_hours (default 24h = daily); unknown models do not
  #      refetch repeatedly within the interval;
  #   2. on remote failure: the stale cached row;
  #   3. last resort: the read-only snapshot bundled at build time from
  #      github.com/anomalyco/models.dev (seeded into the backend on demand).
  #
  # User-supplied provider fields and overrides always win over catalog
  # metadata; missing fields are never fabricated.
  #
  # model_catalog:
  #   enabled: true
  #   source_url: https://models.dev/api.json
  #   refresh_interval_hours: 24                 # source-level refresh cadence (default daily)
  #   fetch_timeout_ms: 10000
  #   offline: false                             # true = never hit the network (bundled snapshot only)
  #   apply_to_model_spec: true                  # fill ModelSpec gaps from catalog
  #   cache:
  #     backend: sqlite                          # sqlite (default) | memory (test/dev) | redis
  #     # sqlite reuses storage.database (keyed model_catalog table, point lookups).
  #     # redis reuses storage.cache.redis and requires storage.cache.kind: redis
  #     # plus a resolvable storage.cache.redis.url_env; use a unique key_prefix
  #     # when sharing Redis across environments.
  #   overrides:                                 # manual per-model overrides win over catalog
  #     "my-llm/gpt-4o-mini":
  #       catalog_id: openai/gpt-4o-mini         # optional models.dev lookup id for custom aliases
  #       context_window: 128000
  #       max_output_tokens: 16384
  #       supports_tool_call: true
  #       supports_vision: true
  #       supports_cache_prompt: true
  #       cost_input_per_mtok: 0.15              # USD per 1M tokens
  #       cost_output_per_mtok: 0.6
  #       display_name: "GPT-4o mini (via gateway)"
  #
  # To map a custom provider to a models.dev provider, add `catalog_provider`
  # (or `catalog_id`) to the provider entry under llm.providers above, e.g.:
  #     - id: my-llm
  #       kind: openai_compatible
  #       catalog_provider: openai               # resolve as openai/<modelId>
  #       # catalog_id: openai/gpt-4o-mini       # or an explicit models.dev lookup id

# ---------------------------------------------------------------------------
# Observability dashboard admin (optional)
# ---------------------------------------------------------------------------
# When AICR_ADMIN_USERNAME and either AICR_ADMIN_PASSWORD or
# AICR_ADMIN_PASSWORD_HASH are set, the server initializes a SQLite observation
# store and enables:
#   - /dashboard          — embedded SPA dashboard
#   - /api/admin/login    — session token creation
#   - /api/admin/stats    — overview + time-window statistics
#   - /api/admin/stats/projects  — per-project stats
#   - /api/admin/stats/providers — per-provider+model stats
#   - /api/admin/runs     — recent run list
# All admin endpoints (except /login) require a Bearer session token.
#
# admin:
#   username_env: AICR_ADMIN_USERNAME
#   password_env: AICR_ADMIN_PASSWORD              # raw password env; omit when password_hash_env is used
#   # password_hash_env: AICR_ADMIN_PASSWORD_HASH  # alternative: sha256:<hex> hash env
#   session_ttl_seconds: 86400

# ---------------------------------------------------------------------------
# Storage (optional, for observability and future features)
# ---------------------------------------------------------------------------
# Controls the local database path and retention for review run statistics.
# The database is created automatically when admin auth is configured, when
# llm.model_catalog uses the sqlite backend, or when reflection memory is enabled.
#
# storage:
#   database:
#     kind: sqlite
#     sqlite:
#       path: /app/data/aicr.sqlite
#     # postgres:
#     #   url_env: AICR_DATABASE_URL  # reserved for future multi-instance deployments
#   cache:
#     kind: memory                    # memory | redis | none
#     # redis:
#     #   url_env: AICR_REDIS_URL     # used by model catalog redis backend and future shared caches
#     # When llm.model_catalog.cache.backend: redis is used, storage.cache.kind
#     # must be redis and this URL env must be configured.
#   object:
#     kind: filesystem                # filesystem | s3
#     filesystem:
#       root: /app/data/objects
#     # s3:
#     #   endpoint_url_env: AICR_S3_ENDPOINT_URL
#     #   bucket: aicr-artifacts
#     #   region_env: AICR_S3_REGION
#     #   access_key_id_env: AICR_S3_ACCESS_KEY_ID
#     #   secret_access_key_env: AICR_S3_SECRET_ACCESS_KEY
#     #   force_path_style: true      # MinIO / RustFS / many S3-compatible endpoints
#   retention:
#     deleted_project_grace_days: 30  # hard-delete soft-deleted projects after this many days

# ---------------------------------------------------------------------------
# Server authentication (optional, recommended for production)
# ---------------------------------------------------------------------------
# Protects /triggers/* endpoints (P4, custom scripts, etc.) with a global API key.
# Callers must send:  X-API-Key: <key>  or  Authorization: Bearer <key>
# /webhooks/* routes (Gitea, GitHub, GitLab) are NOT protected by API key —
# they use per-trigger HMAC signature verification instead (see triggers section).
# Per-workspace keys can also be set (see workspaces section below).
# When auth is configured but no keys are set, the middleware is a no-op.
#
# Generate a key:
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#
# server:
#   auth:
#     api_key_env: AICR_API_KEY          # reads global API key from $AICR_API_KEY
#     enabled: true                       # set false to disable auth middleware

# ---------------------------------------------------------------------------
# Triggers — one per VCS source
# ---------------------------------------------------------------------------
# Every trigger accepts three optional file-filtering fields:
#
#   watch_path       (string[])  Only analyze files under these depot-relative
#                                sub-paths. Omit to analyze all paths.
#                                Example: ["src/", "include/"]
#
#   include_cr_file  (string[])  Glob patterns — a file must match at least one
#                                pattern to be analyzed.
#                                Example: ["**/*.cpp", "*.h", "**/*.py"]
#
#   exclude_cr_file  (string[])  Glob patterns — a file matching any pattern is
#                                skipped (takes priority over include).
#                                Example: ["**/*.gen.cpp", "**/*.pb.h"]
#
# Filter pipeline: all changed files → watch_path → include → exclude → review
#
# Glob syntax:
#   **/*.cpp   matches any depth (foo.cpp, src/foo.cpp, a/b/c/foo.cpp)
#   *.md       matches file basenames at any depth (readme.md, docs/readme.md)
#   src/**     everything under src/
#   **/*.pb.*  matches foo.pb.h, foo.pb.cc, etc.
#
# ── Secret field reference per trigger kind ──
#
#   kind          Secret field             Auth mechanism           Header
#   ───────────   ─────────────────────    ──────────────────────   ────────────────────────
#   gitea         webhook_secret_env       HMAC-SHA256              x-gitea-signature-256
#   forgejo       webhook_secret_env       HMAC-SHA256              x-gitea-signature-256
#   github        webhook_secret_env       HMAC-SHA256              x-hub-signature-256
#   gitlab        webhook_secret_env       Token comparison         x-gitlab-token
#   p4            (none — uses server.auth API key, see above)
#
# * webhook_secret_env — name of an env var holding the shared secret.
#   Omit to skip verification (NOT recommended for production).
#   Only applies to /webhooks/* routes (Gitea, GitHub, GitLab).
# * P4 triggers (/triggers/p4) use server.auth.api_key_env instead.
# * token_env / api_key_env — outbound credentials used by AICR to call
#   the VCS API (post comments, read files). NOT used for inbound auth.
# * user_env / password_env (P4 only) — outbound P4 login credentials.
#
# ── Comment commands ──
#   /aicr review   — Trigger a manual re-review on the PR/MR/issue.
#   /review        — Shorthand alias for /aicr review.
#   When multiple comment commands arrive while a review is already running,
#   AICR deduplicates them: the running review completes first, then AICR
#   automatically triggers one final re-review with the latest event.
#
# ── Review request events ──
#   GitHub pull_request action review_requested triggers a PR re-review.
#   Gitea / Forgejo pull_request_review_request action review_requested also
#   triggers a PR re-review. review_request_removed is ignored.
# ---------------------------------------------------------------------------
triggers:
  # -- Gitea / Forgejo webhook trigger --
  - name: gitea
    kind: gitea # gitea | forgejo | github | gitlab | p4 | svn
    base_url: https://git.example.com # your Gitea / Forgejo base URL
    token_env: AICR_GITEA_TOKEN # outbound: reads token from $AICR_GITEA_TOKEN
    webhook_secret_env: AICR_WEBHOOK_SECRET # inbound: HMAC-SHA256 secret for webhook verification
    # Commit URLs for push/commit targets are derived from base_url + repo + revision.
    # Optional: only analyze files in these paths (omit = all paths)
    # watch_path:
    #   - "src/"
    #   - "include/"
    # Optional: only analyze files matching these glob patterns
    # include_cr_file:
    #   - "**/*.h"
    #   - "**/*.hpp"
    #   - "**/*.cpp"
    #   - "**/*.cc"
    #   - "**/*.cxx"
    #   - "**/*.go"
    #   - "**/*.lua"
    #   - "**/*.cs"
    #   - "**/*.java"
    #   - "**/*.py"
    #   - "**/*.gd"
    #   - "**/*.js"
    #   - "**/*.ts"
    #   - "**/*.mjs"
    #   - "**/*.css"
    #   - "**/*.scss"
    #   - "**/*.html"
    #   - "**/*.cmake"
    #   - "**/*.mako"
    #   - "**/*.in"
    #   - "**/*.yaml"
    #   - "**/*.yml"
    #   - "**/*.xml"
    #   - "**/*.sh"
    #   - "**/*.ps1"
    #   - "**/*.bat"
    #   - "**/*.md"
    #   - "**/*.txt"
    #   - "**/*.jenkinsfile"
    # Optional: exclude generated files from analysis
    # exclude_cr_file:
    #   - "**/*.pb.h"
    #   - "**/*.pb.cc"
    #   - "**/*.gen.h"
    #   - "**/*.gen.cpp"
    #   - "**/*.pb.go"

  # -- GitHub webhook trigger --
  # You can define multiple GitHub triggers on the same /webhooks/github route
  # when different repositories need different outbound tokens, webhook secrets,
  # or file filters. When more than one GitHub trigger is configured, AICR
  # selects the final trigger profile by verified webhook credential and
  # repository full_name before it creates the ReviewEvent.
  # - name: github
  #   kind: github
  #   base_url: https://github.com            # optional for github.com; set to GHE URL for GitHub Enterprise
  #   token_env: AICR_GITHUB_TOKEN            # outbound: personal access token (needs repo scope)
  #   webhook_secret_env: AICR_GITHUB_WEBHOOK_SECRET  # inbound: HMAC-SHA256 secret
  #   repos:                                  # optional: map specific repos to workspaces
  #     - { match: "my-org/my-repo", workspace: github-my-repo }
  # - name: github-partner
  #   kind: github
  #   token_env: AICR_GITHUB_PARTNER_TOKEN
  #   webhook_secret_env: AICR_GITHUB_PARTNER_WEBHOOK_SECRET

  # -- GitLab webhook trigger --
  # GitLab supports the same per-repo profile pattern on /webhooks/gitlab when
  # different repositories need different token/secret/filter combinations.
  # - name: gitlab
  #   kind: gitlab
  #   base_url: https://gitlab.com
  #   token_env: AICR_GITLAB_TOKEN             # outbound: personal access token
  #   webhook_secret_env: AICR_GITLAB_WEBHOOK_SECRET  # inbound: token (sent as x-gitlab-token)

  # -- P4 (Perforce) change-commit trigger --
  # Requires: p4-trigger.sh on the P4 server that POSTs to /triggers/p4
  # The P4 trigger script must send X-API-Key header (from server.auth.api_key_env).
  # See example/README.md "P4 Trigger Configuration" for full setup guide.
  #
  # - name: p4-main
  #   kind: p4
  #   port: "perforce.corp:1666"           # P4 server address:port (prefix ssl: for TLS)
  #   user_env: AICR_P4USER                # outbound: env var for P4 username
  #   password_env: AICR_P4PASSWORD        # outbound: env var for P4 password or login ticket
  #   depot_path: "//depot/main"           # depot or stream path to analyze
  #   workspace: "aicr-p4-main"            # P4 workspace/client name used by AICR
  #   change_url_template: "https://swarm.example.com/changes/{{revision}}"  # optional target link in reports
  #   # AICR initially prints only changed files. During review, agents may use
  #   # aicr.fetch_more_context to fetch full changed files or narrowly related
  #   # files from this depot at the reviewed changelist revision.
  #   # File filtering (all optional):
  #   watch_path:                          # only analyze files under these paths
  #     - "src/"
  #     - "include/"
  # Optional: only analyze files matching these glob patterns
  # include_cr_file:
  #   - "**/*.h"
  #   - "**/*.hpp"
  #   - "**/*.cpp"
  #   - "**/*.cc"
  #   - "**/*.cxx"
  #   - "**/*.go"
  #   - "**/*.lua"
  #   - "**/*.cs"
  #   - "**/*.java"
  #   - "**/*.py"
  #   - "**/*.gd"
  #   - "**/*.js"
  #   - "**/*.ts"
  #   - "**/*.mjs"
  #   - "**/*.css"
  #   - "**/*.scss"
  #   - "**/*.html"
  #   - "**/*.cmake"
  #   - "**/*.mako"
  #   - "**/*.in"
  #   - "**/*.yaml"
  #   - "**/*.yml"
  #   - "**/*.xml"
  #   - "**/*.sh"
  #   - "**/*.ps1"
  #   - "**/*.bat"
  #   - "**/*.md"
  #   - "**/*.txt"
  #   - "**/*.jenkinsfile"
  # Optional: exclude generated files from analysis
  # exclude_cr_file:
  #   - "**/*.pb.h"
  #   - "**/*.pb.cc"
  #   - "**/*.gen.h"
  #   - "**/*.gen.cpp"
  #   - "**/*.pb.go"

  # -- SVN (Subversion) repository profile --
  # The post-commit hook forwards revision metadata to /triggers/svn; AICR
  # uses this required repository_url plus its own SVN credentials to fetch
  # the diff with svn diff/svn cat.
  # Copy example/svn-trigger.sh to the SVN server host and wire it into
  # repository/hooks/post-commit. See example/README.md "SVN Repository
  # Configuration" for the full setup.
  #
  # - name: svn-main
  #   kind: svn
  #   repository_url: "https://svn.example.com/repos/project/trunk"  # required for /triggers/svn
  #   username_env: AICR_SVN_USER          # optional outbound SVN username
  #   password_env: AICR_SVN_PASSWORD      # optional outbound SVN password
  #   trust_server_cert: false             # optional; keep false unless you pin trust externally
  #   revision_url_template: "https://svn.example.com/viewvc/project?view=revision&revision={{revision}}"
  #   # AICR lists changes with svn diff --summarize, initially materializes
  #   # only changed files with svn cat -r, and fetches narrowly related files
  #   # through aicr.fetch_more_context without checking out the whole tree.
  #   watch_path:
  #     - "src/"
  #     - "include/"
  #   include_cr_file:
  #     - "**/*.h"
  #     - "**/*.cpp"
  #     - "**/*.ts"
  #   exclude_cr_file:
  #     - "**/*.pb.h"
  #     - "**/*.gen.cpp"

# ---------------------------------------------------------------------------
# Output channels
# ---------------------------------------------------------------------------
outputs:
  template_engine: handlebars
  # Zero-problem output policy. Notification channels are quiet by default;
  # lifecycle/audit channels can override to publish.
  no_problems: { action: suppress } # publish | suppress

  channels:
    # Gitea PR review — inline line comments on pull requests
    - name: gitea-pr-review
      kind: gitea_pr_review # gitea_pr_review | github_pr_review | gitlab_mr_review | gitea_issue | gitea_problem_issue | github_issue | github_problem_issue | feishu_bot | wecom_bot
      trigger: gitea
      mention_author: false
      no_problems: { action: suppress }
      # review_mode: auto              # auto (default) | review | comment
      #   auto   — try PR review API first, fallback to issue comment on 403/422
      #   review — always use PR review API, no fallback
      #   comment — always use issue comment API (POST /issues/{n}/comments)
      # review_event: COMMENT           # COMMENT (default) | REQUEST_CHANGES
      #   Controls the review event type when using the review API.
      # review_update_strategy: update_existing  # always_new | update_existing (default)
      #   always_new      — create a new review/comment on every push (original behavior)
      #   update_existing — find and update the previous AICR summary comment on the PR.
      #                     Open issues are kept; resolved issues are marked with ✅;
      #                     new issues are tagged with the introducing commit.

    # Feishu (飞书) bot — push aggregated review problems to a Feishu group.
    # Setup: group Settings → Group Bots → Add Bot → Custom Bot → copy webhook & secret.
    # See example/README.md "Feishu Bot Configuration" for full guide.
    #
    # - name: feishu-code-review
    #   kind: feishu_bot
    #   webhook_url_env: AICR_FEISHU_WEBHOOK   # env var with the webhook URL
    #   secret_env: AICR_FEISHU_SECRET          # env var with signing secret
    #                                             (required if bot has signature verification enabled)
    #   mention_author: true                     # @-mention the commit author in the card
    #   mention_fallback: skip                  # "all" = mention everyone, "skip" = no mention if author not found
    #   no_problems: { action: suppress }        # keep quiet when no actionable problems are found
    #   revision_url_template: "https://swarm.example.com/changes/{{revision}}"  # optional P4/SVN link override

    # Gitea managed problem issues — create/close/delete issues per problem fingerprint.
    # Supports: assignees (committer + OWNERS), severity labels, Feishu notifications.
    # Use issue_mode: consolidated to merge all problems from one review into a
    # single scope-aware issue: push reviews key by batch (headSha), PR reviews
    # key by pull number (stable across commits). Different push batches maintain
    # separate issues; a single PR issue stays updated across every commit push.
    #
    # - name: gitea-problem-issues
    #   kind: gitea_problem_issue
    #   trigger: gitea
    #   marker_prefix: "[AICR]"                  # title prefix for managed issues; the rest of the title is auto-shortened with a representative problem summary
    #   marker_label: "aicr-managed"             # hidden marker to identify managed issues
    #   issue_mode: consolidated                 # consolidated (default) | per_problem | per_commit
    #   resolved_action: close                   # none | close (default) | delete | mark_resolved — action when problem is fixed
    #
    #   # -- Assignee configuration --
    #   assign_committer: true                   # add the commit author as assignee (default: true)
    #   owners_file: "OWNERS"                    # path to OWNERS file in repo (default: "OWNERS")
    #   add_owners_as_assignees: true            # add matched OWNERS as assignees (default: false)
    #
    #   # -- Severity labels --
    #   severity_label_prefix: "aicr:problem:"  # auto-created labels: aicr:problem:info, aicr:problem:low, etc.
    #   # severity_label_colors:                  # optional custom colors (hex, without #)
    #   #   info: "207de1"
    #   #   low: "006b75"
    #   #   medium: "fbca04"
    #   #   high: "e11d48"
    #   #   critical: "b60205"
    #
    #   # -- Feishu notification on issue creation --
    #   # notify_feishu:
    #   #   webhook_url_env: FEISHU_ISSUE_NOTIFY_WEBHOOK
    #   #   secret_env: FEISHU_ISSUE_NOTIFY_SECRET

    # GitHub PR review — inline line comments on pull requests.
    # Requires a GitHub trigger (see triggers section above).
    #
    # - name: github-pr-review
    #   kind: github_pr_review
    #   trigger: github
    #   mention_author: true
    #   no_problems: { action: suppress }
    #   review_update_strategy: update_existing  # always_new | update_existing (default)

    # GitHub managed problem issues — create/close issues per problem fingerprint.
    # GitHub does not support deleting issues; resolved_action can only be close or none.
    # Use issue_mode: consolidated to merge all problems from one review into a
    # single scope-aware issue: push reviews key by batch (headSha), PR reviews
    # key by pull number (stable across commits). Different push batches maintain
    # separate issues; a single PR issue stays updated across every commit push.
    # Requires a GitHub trigger/channel token_env with Issues read/write permission;
    # enabling GitHub webhook "Issues" events is not an API permission grant.
    #
    # - name: github-problem-issues
    #   kind: github_problem_issue
    #   trigger: github
    #   marker_prefix: "[AICR]"                  # title prefix only; managed issue titles stay concise automatically with a representative problem summary
    #   marker_label: "aicr-managed"
    #   issue_mode: consolidated                 # consolidated (default) | per_problem | per_commit
    #   resolved_action: close                   # none | close | mark_resolved (GitHub does not support delete)
    #   assign_committer: true
    #   owners_file: "OWNERS"
    #   add_owners_as_assignees: true

    # GitHub issue comment — post aggregated review as a comment on an existing issue.
    #
    # - name: github-issue-comment
    #   kind: github_issue
    #   trigger: github
    #   mention_author: false

    # WeCom (企业微信) bot — push aggregated problems to a WeCom group.
    # Setup: group Settings → Group Bots → Add Bot → copy webhook URL.
    # No signing secret is needed (WeCom group bot webhooks do not use HMAC).
    # See example/README.md "WeCom Bot Configuration" for full guide.
    #
    # - name: wecom-ops
    #   kind: wecom_bot
    #   webhook_url_env: AICR_WECOM_WEBHOOK        # env var with the webhook URL
    #   mention_author: false                       # @-mention the commit author
    #   mention_fallback: skip                      # "all" = mention everyone, "skip" = no mention if author not found
    #   no_problems: { action: suppress }
    #   # mentioned_mobile_list: ["+86-13800138000"] # optional: @ specific users by phone number

  routes:
    default:
      line_comments: [gitea-pr-review]
      summary: [gitea-pr-review]
    # Route specific triggers to different output channels.
    # Each rule has a "match" filter and output channel lists.
    # rules:
    #   - match:
    #       trigger: p4-main                # match events from the p4-main trigger
    #       target_kind: commit              # match commit events only
    #     summary: [feishu-code-review]      # send summary to Feishu
    #   - match:
    #       trigger: github                  # GitHub push events have no PR line-comment target
    #       target_kind: push
    #     summary: [feishu-code-review, github-problem-issues]

# ---------------------------------------------------------------------------
# Queue
# ---------------------------------------------------------------------------
queue:
  kind: memory # memory (default) | sqlite | redis  (rabbitmq is reserved, not yet implemented)

  workers:
    concurrency: 4
    per_workspace_concurrency: 1
    lock_ttl_seconds: 1800

  # SQLite durable queue (survives restarts; single-process or multiple
  # processes sharing the same file). Uses better-sqlite3 with WAL.
  # sqlite:
  #   path: data/queue.sqlite     # default
  #   lock_ttl_seconds: 300       # stale-running reclaim TTL (default 300)

  # rate_limit:
  #   per_provider_rps:   # Per-provider requests-per-second cap (provider id → rps)
  #     gitea-internal: 5

  # retry:
  #   attempts: 2          # Retry once on transient failures (default: 1 = no retry)
  #   backoff:
  #     kind: exponential  # exponential | linear | constant
  #     base_ms: 5000
  #     max_ms: 60000
  #     jitter: true

  # dead_letter:
  #   enabled: true       # When true, exhausted retries are parked for inspection
  #   max_age_hours: 72   # Parked items older than this are pruned

# ---------------------------------------------------------------------------
# Diff compression (AICR-side)
# ---------------------------------------------------------------------------
# When the task context (diff + instructions) exceeds a token budget, AICR
# summarizes the diff per-file using a "light" model, keeps only the highest-
# risk hunks, and truncates to fit the model's context window. This runs
# BEFORE the review model or agent sees the task, preventing context-overflow
# failures on large PRs/changelists.
#
# Sensible defaults are derived from the model's context window when this
# section is omitted, but tuning is recommended for production. To effectively
# disable compression (restore the pre-default behavior), set trigger_tokens
# to a value well above your model's context window.
#   - trigger_tokens:      start compressing above this token estimate
#                          (default: min(131072, 60% of context_window))
#   - max_input_ratio:     also compress when task > ratio × context_window
#                          (default 0.6)
#   - keep_hunks_top_k:    number of highest-risk hunks to retain verbatim
#                          (default 30)
#   - context_lines:       context lines around retained hunks (default 5)
#   - summarize_model_role: fallback_chain role used for per-file summaries
#                          (default "light"; falls back to first chain entry)
#   - per_model_overrides: per-model trigger_tokens overrides, keyed
#                          "<providerKind>:<modelId>"
#
# compression:
#   trigger_tokens: 131072
#   max_input_ratio: 0.6
#   keep_hunks_top_k: 30
#   context_lines: 5
#   summarize_model_role: light
#   per_model_overrides:
#     "anthropic:claude-sonnet-4.6": { trigger_tokens: 393216 }

# ---------------------------------------------------------------------------
# Agent & sandbox
# ---------------------------------------------------------------------------
# Kilo is the default supported agent path. Set agent.default to another
# AgentKind (opencode, zoo, claude-code, copilot-cli) only when explicitly
# validating that adapter. Set to "native-llm" only for direct-LLM debugging.
# Agent sandboxes expose scoped source read-only and AICR MCP tools. If an
# agent needs more code to validate a changed line, it should inspect mounted
# files with read-only commands or call aicr.fetch_more_context for a concrete
# path; final summaries that only say the full repository is inaccessible are
# treated as format/context failures and repaired by the orchestrator.
#
# Context auto-compaction: when enabled (default), AICR injects each agent's
# native compaction settings so long-running reviews (large diffs, many tool
# calls) summarize conversation history before hitting the model's context
# window. This complements (does not replace) the top-level compression
# diff-summarization settings. The agent MUST know the model's context window
# for compaction to activate — enable llm.model_catalog or set context_window
# in overrides so the limit is injected into the agent config.
#   - Kilo:        compaction.auto / threshold_percent / prune in kilo.json
#   - opencode:    compaction.auto / prune in opencode config
#   - Zoo:         autoCondenseContext / condenseContextPercentThreshold in .roo/settings.json
#   - Claude Code: auto-compacts by default (delegated, no config injected)
#   - Copilot CLI: not applicable (no context management surface)
agent:
  default: kilo
  # Hard cap on a SINGLE agent run. On timeout the sandbox kills the WHOLE
  # process tree (the agent binary plus its worker subprocesses, including
  # workers that `setsid` into their own session), so a run cannot overrun by
  # leaving orphaned workers behind. The orchestrator may run several passes
  # (initial + context-repair + direct-LLM fallback), so the wall-clock per
  # review can be a few times this value. Keep it comfortably above the slowest
  # expected single pass; raise it for large PRs (production uses 600).
  timeout_seconds: 300
  auto_approve: true
  context_compaction:
    auto: true # enable auto-compaction in supported agent runtimes
    # threshold_percent: 80 # compact at 80% of the model context window (Kilo)
    prune: true # prune old tool outputs between turns (Kilo/opencode)
  sandbox:
    # For deploy.sh + AICR_ENABLE_CONTAINER_SANDBOX with a mounted Podman
    # socket, prefer kind: podman and engine: podman. Docker-compatible mode
    # remains available when a workflow specifically expects the Docker CLI.
    kind: docker # native | docker | podman | docker_socket | k8s_pod | firecracker (reserved)
    engine: auto # auto | docker | podman

# ---------------------------------------------------------------------------
# Review defaults
# ---------------------------------------------------------------------------
review:
  languages_auto_detect: true
  include: ["**/*"]
  exclude:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/dist/**"
    - "**/coverage/**"
    - "**/vendor/**"
    - "**/*.min.js"
    - "**/*.lock"
  max_files: 50
  max_patch_bytes: 200000
  skip_lgtm: true
  output_language: en # en | zh-CN | ja | …
  # log_thinking: false             # set false to suppress verbose orchestrator thinking/execution logs (default: true)
  commit_strategy: aggregate # aggregate | per_commit | head_only
  git:
    allow_deepen: true
  # AICR label management — skip review if PR/MR/issue has these labels,
  # and auto-tag targets when review starts/completes.
  # All fields support global → workspace-level override.
  labels:
    ignore: ["aicr:ignore", "aicr-ignore"]
    auto_tag: "aicr"
    reviewed_tag: "aicr:reviewed"
  # Managed problem issue lifecycle scan cap. AICR lists only the most recent
  # open managed issues before closing stale ones. Range: 1..100, default: 20.
  problem_issue:
    max_recent_issues: 20
  # Reflection memory: learn abstract patterns from past reviews in the same workspace.
  # Enabled by default when admin auth + store are configured.
  # Stored memory is scrubbed and abstract: category/severity/file type/scope,
  # repo convention hints, summary titles, skip reasons, and optional relative
  # path + line references; never source snippets or cross-workspace knowledge.
  # reflection:
  #   enabled: true
  #   mode: light              # light | thorough
  #                             # light    = per-category patterns, file-type scope,
  #                             #            repo conventions, summary title
  #                             # thorough = light + cross-run recurring-category detection
  #                             #            (flags categories reported in 3+ recent reviews)
  #   memory:
  #     retention_days: 90     # how long reflection entries are kept
  #     max_entries: 500       # max entries per workspace before compaction

# ---------------------------------------------------------------------------
# Workspaces — one per repository you want to review
# ---------------------------------------------------------------------------
# Each workspace can optionally override the global auth with its own API key:
#   auth:
#     api_key_env: AICR_WORKSPACE_API_KEY  # env var with a per-workspace key
#     enabled: true
# ---------------------------------------------------------------------------
workspaces:
  cache:
    max_total_gb: 10
    eviction: lru
    ttl_days: 30

  defaults:
    outputs:
      no_problems: { action: suppress }
    # prompt:                           # per-workspace prompt overrides (see instances below)
    #   base_system_prompt_file: "prompts/system/code-reviewer.system.md"
    #   force_skills:                   # skill names to always activate regardless of Applies To glob
    #     - "repo-conventions"

  instances:
    # Gitea workspace
    my-repo:
      source_repo:
        trigger: gitea # references trigger name above
        repo: "my-org/my-repo" # owner/repo on your Gitea
      outputs:
        line_comments: [gitea-pr-review]
        summary: [gitea-pr-review]
        # Per-workspace/channel override. Set publish for audit-heavy repos.
        # channel_overrides:
        #   feishu-code-review:
        #     no_problems: { action: publish }
      # Optional per-workspace override for latency-sensitive repositories.
      # review:
      #   problem_issue:
      #     max_recent_issues: 10
      # Per-workspace auth (optional, overrides global server.auth)
      # auth:
      #   api_key_env: AICR_MY_REPO_API_KEY
      #   enabled: true
      # Per-workspace prompt override (optional, overrides global --base-prompt)
      # prompt:
      #   base_system_prompt_file: "prompts/system/strict-reviewer.system.md"
      #   force_skills:                     # always activate these skills regardless of glob matching
      #     - "security-audit"

    # P4 workspace — uncomment when p4-main trigger is enabled
    # p4-main:
    #   source_repo:
    #     trigger: p4-main
    #     repo: "//depot/main"
    #   outputs:
    #     summary: [feishu-code-review]

    # SVN workspace — uncomment when svn-main profile is enabled
    # svn-main:
    #   source_repo:
    #     trigger: svn-main
    #     repo: "https://svn.example.com/repos/project/trunk"
    #   outputs:
    #     summary: [feishu-code-review]

    # GitHub workspace — uncomment when github trigger is enabled
    # github-my-repo:
    #   source_repo:
    #     trigger: github                      # bind this repo to the matching GitHub trigger profile
    #     repo: "my-org/my-repo"               # owner/repo on GitHub
    #   outputs:
    #     line_comments: [github-pr-review]
    #     summary: [github-pr-review, feishu-code-review, github-problem-issues]

    # github-partner-repo:
    #   source_repo:
    #     trigger: github-partner
    #     repo: "partner-org/partner-repo"
    #   outputs:
    #     line_comments: [github-pr-review]
    #     summary: [github-pr-review, github-problem-issues]

# --- Template overrides ---
# Built-in templates live in templates/builtin/*.hbs in the deployment directory.
# Override them per workspace by placing files under:
#   workspaces/<workspace_id>/templates/
#
# Candidate file names (checked in order):
#   1. <channel_name>.<kind>.md.hbs  (e.g., feishu-code-review.summary.md.hbs)
#   2. <channel_name>.<kind>.hbs
#   3. <channel_kind>.<kind>.md.hbs  (e.g., feishu_bot.summary.md.hbs)
#   4. <channel_kind>.<kind>.hbs
#   5. <kind>.md.hbs                  (e.g., summary.md.hbs)
#   6. <kind>.hbs
#
# Template variables available:
#   event:  { author, email, displayName, url, title }
#   target: { kind, displayText, markdownLink, url, ... }
#   repo:   { name, fullName }
#   vcs:    { branch, sourcePath, workspace, repositoryPath }
#   run:    { id }
#   atMentions: pre-rendered channel-specific mention string
#   summary: review summary markdown
#   problems: array of { file, line, severity, category, message, suggestion, location }
#   problem: single problem (in problem template only)
#
# Example: create workspaces/p4-main/templates/feishu_bot.summary.hbs
#   **{{target.displayText}}**{{#if event.author}}
#   **Author**: @{{event.author}}{{#if event.email}} <{{event.email}}>{{/if}}{{/if}}{{#if vcs.sourcePath}}
#   **Source**: {{vcs.sourcePath}}{{/if}}{{#if vcs.workspace}}
#   **Workspace**: {{vcs.workspace}}{{/if}}
#   {{{summary}}}
