# =============================================================================
# AICodeReviewer — docker compose deployment
# =============================================================================
# Usage:
#   1. Copy .env.sample → .env and fill in secrets
#   2. Edit config.yaml to match your environment
#   3. docker compose up -d
#
# The config.yaml and .env live next to this file.
# The container mounts ./config.yaml (read-only) and reads env vars from .env.
#
# Volumes:
#   ./config.yaml  → /app/config.yaml:ro   — read-only config
#   aicr-data      → /app/data             — persistent queue DB, run history
#   aicr-workspaces→ /app/workspaces       — cloned repo caches
#   aicr-logs      → /app/logs             — application log files

services:
  aicr:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: aicodereviewer:latest
    ports:
      - "${AICR_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - aicr-data:/app/data
      - aicr-workspaces:/app/workspaces
      - aicr-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/healthz').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  aicr-data:
  aicr-workspaces:
  aicr-logs:
