# =============================================================================
# AICodeReviewer — docker compose deployment
# =============================================================================
# Usage:
#   1. Copy .env.sample → .env and fill in secrets
#   2. Edit config.yaml to match your environment
#   3. docker compose up -d
#
# The config.yaml and .env live next to this file.
# The container mounts ./config.yaml and reads env vars from .env.

services:
  aicr:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: aicodereviewer:latest
    ports:
      - "${AICR_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - aicr-workspaces:/app/workspaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/healthz').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  aicr-workspaces:
